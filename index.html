<style>
:root{
  --bg:#0b0f19;
  --card:#121826;
  --accent:#4f46e5;
  --accent2:#06b6d4;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
}

/* CONTAINER */
.wrap{
  max-width:1200px;
  margin:auto;
  padding:clamp(16px,3vw,32px);
}

/* HEADER */
header{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.logo{
  font-weight:800;
  font-size:clamp(18px,2vw,22px);
}

/* NAV - SCROLLABLE MOBILE */
nav{
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
}
nav::-webkit-scrollbar{display:none}

nav button{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-weight:600;
  font-size:clamp(13px,1.2vw,15px);
  white-space:nowrap;
  padding:8px 10px;
  border-radius:8px;
}

nav button.active{
  color:#fff;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
}

/* HERO */
.hero{
  padding:clamp(30px,6vw,80px) 0;
}

.hero h1{
  font-size:clamp(26px,5vw,48px);
  font-weight:800;
  line-height:1.2;
}

.gradient{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  color:transparent;
}

.hero p{
  margin-top:15px;
  color:var(--muted);
  max-width:600px;
  font-size:clamp(14px,1.5vw,16px);
}

/* METRICS GRID */
.metrics{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  margin-top:30px;
}

.metric{
  background:var(--card);
  padding:18px;
  border-radius:12px;
  text-align:center;
}

.metric h2{
  font-size:clamp(20px,3vw,28px);
}

/* SECTION */
.section{
  display:none;
  margin-top:30px;
}
.section.active{display:block}

/* CARDS */
.card{
  background:var(--card);
  padding:clamp(16px,2vw,22px);
  border-radius:12px;
  margin-top:15px;
}

/* EXPERIENCE LIST FIX */
.card ul{
  margin-top:10px;
  padding-left:18px;
}

/* CASE */
.case{
  border-left:4px solid var(--accent);
}

/* CLIENT LOGOS */
.logos{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
  gap:12px;
  margin-top:20px;
}

.logo-box{
  background:#fff;
  color:#000;
  padding:18px;
  text-align:center;
  border-radius:10px;
  font-weight:600;
  font-size:14px;
}

/* TESTIMONIAL */
.testimonial{
  font-style:italic;
  font-size:clamp(14px,1.5vw,16px);
}

/* CONTACT FORM */
input,textarea{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

textarea{min-height:120px}

button.submit{
  margin-top:10px;
  width:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border:none;
  color:white;
  padding:14px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

/* TABLET IMPROVEMENT */
@media(min-width:768px){
  header{
    flex-wrap:nowrap;
  }

  nav{
    overflow:visible;
  }

  button.submit{
    width:auto;
  }
}

/* DESKTOP POLISH */
@media(min-width:1200px){
  .hero{
    padding:100px 0;
  }
}
</style>
